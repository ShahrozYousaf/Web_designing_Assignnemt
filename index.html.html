<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment No 2 - Registration Form</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #b0b0b0;
      font-family: Arial, sans-serif;
    }

    .reg-card {
      background: #1a1a2e;
      border-radius: 18px;
      padding: 2rem 1.8rem 1.8rem;
      width: 100%;
      max-width: 380px;
    }

    .reg-card h1 {
      color: #ffffff;
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.6rem;
      letter-spacing: 0.5px;
    }

    .reg-card input[type="text"],
    .reg-card input[type="email"],
    .reg-card input[type="tel"],
    .reg-card input[type="date"],
    .reg-card input[type="password"],
    .reg-card textarea {
      width: 100%;
      background: transparent;
      border: 1.5px solid #6c3fc5;
      border-radius: 24px;
      padding: 10px 16px;
      color: #cccccc;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
      display: block;
    }

    .reg-card textarea {
      border-radius: 14px;
      resize: none;
    }

    .reg-card input::placeholder,
    .reg-card textarea::placeholder {
      color: #888888;
    }

    .reg-card input:focus,
    .reg-card textarea:focus {
      border-color: #9b59f7;
      color: #ffffff;
    }

    .gender-row {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 4px 4px 14px 4px;
    }

    .gender-row span {
      color: #888888;
      font-size: 14px;
    }

    .gender-row label {
      color: #cccccc;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .gender-row input[type="radio"] {
      accent-color: #7b3fe4;
      width: auto;
      margin: 0;
    }

    .btn-register {
      width: 100%;
      padding: 12px;
      background: #7b3fe4;
      color: #ffffff;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      margin-bottom: 10px;
      display: block;
    }

    .btn-register:hover {
      background: #9b59f7;
    }

    .btn-signin {
      width: 100%;
      padding: 11px;
      background: transparent;
      color: #ffffff;
      border: 2px solid #7b3fe4;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      display: block;
    }

    .btn-signin:hover {
      background: rgba(123, 63, 228, 0.15);
    }
  </style>
</head>
<body>
  <div class="reg-card">
    <h1>Register</h1>

    <input type="text" placeholder="Full Name" />
    <input type="text" placeholder="Father's Name" />
    <input type="text" placeholder="Mother's Name" />
    <input type="date" placeholder="Date of Birth" />

    <div class="gender-row">
      <span>Gender</span>
      <label><input type="radio" name="gender" /> Male</label>
      <label><input type="radio" name="gender" /> Female</label>
    </div>

    <input type="email" placeholder="E-mail" />
    <input type="tel" placeholder="Phone" />
    <input type="text" placeholder="State" />
    <input type="text" placeholder="City" />
    <textarea placeholder="Address" rows="3"></textarea>
    <input type="password" placeholder="Password" />
    <input type="password" placeholder="Confirm Password" />

    <button class="btn-register">Register</button>
    <button class="btn-signin">Have account? Sign In</button>
  </div>
</body>
</html>
